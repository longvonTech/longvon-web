name: Deploy to ECS

# CI 在 main 分支 push 且通过后自动部署；也可在 Actions 页手动触发。
# 代码在 GitHub Actions 拉取后 rsync 到 ECS，避免 ECS 直连 GitHub 的 TLS 问题。

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to production ECS
    runs-on: ubuntu-latest
    environment: production
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_branch == 'main'
      )

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Sync code to ECS and deploy
        env:
          ECS_HOST: ${{ secrets.ECS_HOST }}
          ECS_USER: ${{ secrets.ECS_USER }}
          ECS_SSH_KEY_B64: ${{ secrets.ECS_SSH_KEY_B64 }}
        run: |
          set -euo pipefail
          KEY_FILE="${RUNNER_TEMP}/ecs_deploy_key"
          echo "$ECS_SSH_KEY_B64" | base64 -d > "$KEY_FILE"
          chmod 600 "$KEY_FILE"
          ssh-keygen -y -f "$KEY_FILE" > /dev/null
          SSH_OPTS=(-i "$KEY_FILE" -o StrictHostKeyChecking=accept-new)
          ssh-keyscan -H "$ECS_HOST" >> "$HOME/.ssh/known_hosts" 2>/dev/null || true

          RSYNC_SSH="ssh -i ${KEY_FILE} -o StrictHostKeyChecking=accept-new"
          echo "==> Rsync source to ECS (skip git pull on server)"
          rsync -az \
            --exclude node_modules \
            --exclude apps/web/.next \
            --exclude apps/api/dist \
            --exclude .git \
            --exclude .env.production \
            -e "$RSYNC_SSH" \
            ./ "${ECS_USER}@${ECS_HOST}:/root/mateyou/"

          echo "==> Run deploy on ECS"
          ssh "${SSH_OPTS[@]}" "${ECS_USER}@${ECS_HOST}" << 'ENDSSH'
          set -e
          cd /root/mateyou
          DEPLOY_SKIP_GIT_PULL=1 ./scripts/deploy.sh
          echo "==> Health check (wait for Next.js)"
          wait_for() {
            local url="$1"
            local label="$2"
            for i in $(seq 1 36); do
              if curl -sf -o /dev/null "$url"; then
                echo "OK $label"
                return 0
              fi
              echo "waiting $label ($i/36)..."
              sleep 5
            done
            echo "FAIL $label"
            pm2 status || true
            pm2 logs mateyou-web --lines 40 --nostream || true
            return 1
          }
          wait_for http://localhost:3000/assessment "assessment"
          wait_for http://localhost:3000/assessment/diabetes "diabetes"
          wait_for http://localhost:3000/assessment/altitude "altitude"
          pm2 status
          echo "✅ GitHub Actions deploy finished"
          ENDSSH
          rm -f "$KEY_FILE"
