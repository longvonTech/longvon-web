name: Deploy to ECS

# CI 在 main 分支 push 且通过后自动部署；也可在 Actions 页手动触发。

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to production ECS
    runs-on: ubuntu-latest
    environment: production
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_branch == 'main'
      )

    steps:
      - name: Deploy via SSH
        env:
          ECS_HOST: ${{ secrets.ECS_HOST }}
          ECS_USER: ${{ secrets.ECS_USER }}
          ECS_SSH_KEY_B64: ${{ secrets.ECS_SSH_KEY_B64 }}
        run: |
          set -euo pipefail
          KEY_FILE="${RUNNER_TEMP}/ecs_deploy_key"
          echo "$ECS_SSH_KEY_B64" | base64 -d > "$KEY_FILE"
          chmod 600 "$KEY_FILE"
          ssh-keygen -y -f "$KEY_FILE" > /dev/null
          ssh-keyscan -H "$ECS_HOST" >> "$HOME/.ssh/known_hosts" 2>/dev/null || true
          ssh -i "$KEY_FILE" -o StrictHostKeyChecking=accept-new "${ECS_USER}@${ECS_HOST}" << 'ENDSSH'
          set -e
          cd /root/mateyou
          echo "==> Pull latest main"
          git pull origin main
          echo "==> Run deploy script"
          ./scripts/deploy.sh
          echo "==> Health check"
          curl -sf -o /dev/null http://localhost:3000/assessment
          curl -sf -o /dev/null http://localhost:3000/assessment/diabetes
          curl -sf -o /dev/null http://localhost:3000/assessment/altitude
          pm2 status
          echo "✅ GitHub Actions deploy finished"
          ENDSSH
          rm -f "$KEY_FILE"
