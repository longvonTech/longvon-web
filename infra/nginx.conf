# MATEYOU Platform — Nginx Production Config
# 适用：阿里云ECS + Docker，域名 www.longvon.com
# SSL 证书路径：/etc/ssl/mateyou/（从阿里云 SSL 控制台下载 Nginx 格式）

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # 日志格式（含百度爬虫识别字段）
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time urt=$upstream_response_time';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 256;
    server_tokens off;

    # 安全响应头
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # HTTP → HTTPS 强制跳转
    server {
        listen 80;
        server_name www.longvon.com longvon.com;

        # 百度搜索资源平台验证文件（部署后按需添加）
        location = /baidu_verify_xxxx.html {
            root /usr/share/nginx/html;
        }

        location / {
            return 301 https://www.longvon.com$request_uri;
        }
    }

    # HTTPS 主站
    server {
        listen 443 ssl http2;
        server_name www.longvon.com;

        # SSL 证书（阿里云 SSL，Nginx 格式，挂载至 /etc/ssl/mateyou/）
        ssl_certificate /etc/ssl/mateyou/fullchain.pem;
        ssl_certificate_key /etc/ssl/mateyou/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE:ECDH:AES:HIGH:!NULL:!aNULL:!MD5:!ADH:!RC4;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # HSTS（上线后确认稳定再开启）
        # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # ── API 代理 ─────────────────────────────
        location /api/ {
            # 注意：前端直接调用 /api/ 前缀的路由（如 /api/health）走这里
            # 业务 API 端点（/auth /customer /knowledge 等）不带 /api 前缀，
            # 需要在前端 apiFetch 或此处根据路由规则分别配置
            proxy_pass http://api:4000/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # 百度主动推送接收端点（Sprint 8 百度 SEO）
        location = /baidu-push {
            proxy_pass http://api:4000/seo/baidu-push;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ── Next.js 前端 ──────────────────────────
        location / {
            proxy_pass http://web:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
            proxy_cache_bypass $http_upgrade;
        }

        # Next.js 静态资源长期缓存
        location /_next/static/ {
            proxy_pass http://web:3000/_next/static/;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        # 图片/字体等静态资源
        location ~* \.(ico|png|jpg|jpeg|gif|webp|svg|woff|woff2|ttf|eot)$ {
            proxy_pass http://web:3000;
            add_header Cache-Control "public, max-age=86400";
        }
    }

    # 裸域名 longvon.com → www.longvon.com
    server {
        listen 443 ssl http2;
        server_name longvon.com;
        ssl_certificate /etc/ssl/mateyou/fullchain.pem;
        ssl_certificate_key /etc/ssl/mateyou/privkey.pem;
        return 301 https://www.longvon.com$request_uri;
    }
}
